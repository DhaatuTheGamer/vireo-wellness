<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vireo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class', // Enable class-based dark mode
        theme: {
          extend: {
            animation: {
              'spin-medium-cw': 'spin-medium-cw 18s linear infinite',
              'spin-slow-ccw': 'spin-slow-ccw 25s linear infinite',
            },
            keyframes: {
              'spin-medium-cw': {
                '0%': { transform: 'rotate(0deg)' },
                '100%': { transform: 'rotate(360deg)' },
              },
              'spin-slow-ccw': {
                '0%': { transform: 'rotate(0deg)' },
                '100%': { transform: 'rotate(-360deg)' },
              },
            }
          }
        }
      }
    </script>
    <style>
      body {
        font-family: 'Inter', sans-serif; /* A common, clean sans-serif font */
      }
      /* Theme-aware Recharts styles */
      html.dark .recharts-text, html.dark .recharts-legend-item-text {
        fill: #cbd5e1; /* slate-300 for dark mode text */
      }
      html.dark .recharts-cartesian-axis-tick-value {
         fill: #cbd5e1; /* slate-300 for dark mode axis text */
      }
      html.dark .recharts-default-tooltip {
        background-color: rgba(51, 65, 85, 0.95) !important; /* slate-700 with opacity */
        border: 1px solid #475569 !important; /* slate-600 */
        color: #f1f5f9 !important; /* slate-100 */
        border-radius: 0.375rem !important; /* rounded-md */
      }
      html.dark .recharts-tooltip-label {
         color: #e2e8f0 !important; /* slate-200 */
      }

      /* Custom scrollbar for webkit browsers */
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      /* Dark theme scrollbar */
      html.dark ::-webkit-scrollbar-track {
        background: #1e293b; /* slate-800 */
      }
      html.dark ::-webkit-scrollbar-thumb {
        background: #475569; /* slate-600 */
        border-radius: 3px;
      }
      html.dark ::-webkit-scrollbar-thumb:hover {
        background: #64748b; /* slate-500 */
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react-dom/": "https://esm.sh/react-dom@^19.1.0/",
    "react/": "https://esm.sh/react@^19.1.0/",
    "react": "https://esm.sh/react@^19.1.0",
    "react-router-dom": "https://esm.sh/react-router-dom@^7.6.1",
    "recharts": "https://esm.sh/recharts@^2.15.3"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body class="bg-slate-800 text-slate-100 transition-colors duration-300">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
